services:
  database:
    image: postgres:17-alpine
    container_name: koen-db
    environment:
      POSTGRES_DB: koen
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: koen-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@koen.local
      PGADMIN_DEFAULT_PASSWORD: password
    ports:
      - "5050:80"
    depends_on:
      - database
    restart: always

volumes:
  pgdata:
